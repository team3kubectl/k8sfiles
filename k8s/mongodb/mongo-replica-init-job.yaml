apiVersion: batch/v1
kind: Job
metadata:
  name: mongo-replica-init
  namespace: team3-ns
spec:
  template:
    spec:
      serviceAccountName: default
      containers:
      - name: mongo-init
        image: mongo:6.0
        command:
          - /bin/bash
          - -c
          - |
            until mongosh --host events-mongodb-0.events-mongodb --authenticationDatabase admin -u admin -p adminpass --eval "db.adminCommand('ping')" &>/dev/null; do
              echo "Waiting for MongoDB to be ready..."
              sleep 5
            done
            
            echo "MongoDB is ready. Initiating replica set..."
            
            mongosh --host events-mongodb-0.events-mongodb --authenticationDatabase admin -u admin -p adminpass <<EOF
            rs.initiate(
              {
                _id : "rs0",
                members: [
                  { _id : 0, host : "events-mongodb-0.events-mongodb.team3-ns.svc.cluster.local:27017" },
                  { _id : 1, host : "events-mongodb-1.events-mongodb.team3-ns.svc.cluster.local:27017" },
                  { _id : 2, host : "events-mongodb-2.events-mongodb.team3-ns.svc.cluster.local:27017" }
                ]
              }
            )
            EOF
            
            echo "Replica set initialization complete!"
            sleep 10
            
            mongosh --host events-mongodb-0.events-mongodb --authenticationDatabase admin -u admin -p adminpass --eval "rs.status()"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
      restartPolicy: OnFailure
  backoffLimit: 5
