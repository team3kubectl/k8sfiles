apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: team3-ns
data:
  REDIS_HOST: notification-redis
  REDIS_PORT: "6379"
---
apiVersion: v1
kind: Service
metadata:
  name: notification-redis
  namespace: team3-ns
spec:
  selector:
    app: notification-redis
  ports:
  - port: 6379
    targetPort: 6379
  clusterIP: None 
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: notification-redis
  namespace: team3-ns
spec:
  serviceName: notification-redis
  replicas: 1
  selector:
    matchLabels:
      app: notification-redis
  template:
    metadata:
      labels:
        app: notification-redis
    spec:
      containers:
        - name: redis
          image: redis:7.0-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379
          envFrom:
            - configMapRef:
                name: redis-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "200m"