{{- if .Values.services.notification.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: notification
  ports:
  - port: {{ .Values.services.notification.port }}
    targetPort: {{ .Values.services.notification.port }}
  type: ClusterIP
{{- end }}
