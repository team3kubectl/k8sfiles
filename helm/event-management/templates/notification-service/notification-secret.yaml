{{- if .Values.services.notification.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: notification-secret
  namespace: {{ .Values.global.namespace }}
type: Opaque
data:
  {{- range $key, $value := .Values.services.notification.secrets }}
  {{ $key }}: {{ $value | b64enc }}
  {{- end }}
{{- end }}
