{{- if .Values.services.events.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: events-deployment
  namespace: {{ .Values.global.namespace }}
  labels:
    app: events-service
spec:
  replicas: {{ .Values.services.events.replicas }}
  {{- if .Values.services.events.minReadySeconds }}
  minReadySeconds: {{ .Values.services.events.minReadySeconds }}
  {{- end }}
  strategy:
    type: {{ .Values.services.events.strategy.type }}
    rollingUpdate:
      maxUnavailable: {{ .Values.services.events.strategy.maxUnavailable }}
      maxSurge: {{ .Values.services.events.strategy.maxSurge }}
  selector:
    matchLabels:
      app: events-service
  template:
    metadata:
      labels:
        app: events-service
    spec:
      {{- if .Values.services.events.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ .Values.services.events.terminationGracePeriodSeconds }}
      {{- end }}
      containers:
        - name: events-service
          image: {{ .Values.services.events.image }}
          imagePullPolicy: {{ .Values.services.events.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.services.events.port }}
          envFrom:
            - configMapRef:
                name: events-config
            - secretRef:
                name: events-secret
          resources:
            requests:
              cpu: {{ .Values.services.events.resources.requests.cpu | quote }}
              memory: {{ .Values.services.events.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.services.events.resources.limits.cpu | quote }}
              memory: {{ .Values.services.events.resources.limits.memory | quote }}
          {{- if .Values.services.events.probes.startup.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.services.events.probes.startup.path }}
              port: {{ .Values.services.events.port }}
            initialDelaySeconds: {{ .Values.services.events.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.services.events.probes.startup.periodSeconds }}
            failureThreshold: {{ .Values.services.events.probes.startup.failureThreshold }}
          {{- end }}
          {{- if .Values.services.events.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.services.events.probes.readiness.path }}
              port: {{ .Values.services.events.port }}
            initialDelaySeconds: {{ .Values.services.events.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.services.events.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.services.events.probes.readiness.failureThreshold }}
          {{- end }}
          {{- if .Values.services.events.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.services.events.probes.liveness.path }}
              port: {{ .Values.services.events.port }}
            initialDelaySeconds: {{ .Values.services.events.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.services.events.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.services.events.probes.liveness.failureThreshold }}
          {{- end }}
{{- end }}
