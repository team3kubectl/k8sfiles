{{- if .Values.services.events.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: events-service
  namespace: {{ .Values.global.namespace }}
spec:
  type: ClusterIP
  selector:
    app: events-service
  ports:
    - port: {{ .Values.services.events.port }}
      targetPort: {{ .Values.services.events.port }}
{{- end }}
