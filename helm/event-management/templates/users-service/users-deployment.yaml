{{- if .Values.services.users.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: users-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app: users-service
spec:
  replicas: {{ .Values.services.users.replicas }}
  {{- if .Values.services.users.minReadySeconds }}
  minReadySeconds: {{ .Values.services.users.minReadySeconds }}
  {{- end }}
  strategy:
    type: {{ .Values.services.users.strategy.type }}
    rollingUpdate:
      maxUnavailable: {{ .Values.services.users.strategy.maxUnavailable }}
      maxSurge: {{ .Values.services.users.strategy.maxSurge }}
  selector:
    matchLabels:
      app: users-service
  template:
    metadata:
      labels:
        app: users-service
    spec:
      {{- if .Values.services.users.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ .Values.services.users.terminationGracePeriodSeconds }}
      {{- end }}
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.35
          command: ['sh', '-c', 'until nc -z postgres-db {{ .Values.databases.postgres.port }}; do echo waiting for postgres; sleep 2; done']
      containers:
        - name: users-service
          image: {{ .Values.services.users.image }}
          imagePullPolicy: {{ .Values.services.users.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.services.users.port }}
          envFrom:
            - configMapRef:
                name: users-config
            - secretRef:
                name: users-secret
          resources:
            requests:
              cpu: {{ .Values.services.users.resources.requests.cpu | quote }}
              memory: {{ .Values.services.users.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.services.users.resources.limits.cpu | quote }}
              memory: {{ .Values.services.users.resources.limits.memory | quote }}
          {{- if .Values.services.users.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.services.users.probes.readiness.path }}
              port: {{ .Values.services.users.port }}
            initialDelaySeconds: {{ .Values.services.users.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.services.users.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.services.users.probes.readiness.failureThreshold }}
          {{- end }}
          {{- if .Values.services.users.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.services.users.probes.liveness.path }}
              port: {{ .Values.services.users.port }}
            initialDelaySeconds: {{ .Values.services.users.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.services.users.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.services.users.probes.liveness.failureThreshold }}
          {{- end }}
{{- end }}
