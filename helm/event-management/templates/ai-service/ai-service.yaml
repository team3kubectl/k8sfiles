{{- if .Values.services.ai.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: ai-service
  ports:
    - port: {{ .Values.services.ai.port }}
      targetPort: {{ .Values.services.ai.port }}
  type: ClusterIP
{{- end }}
