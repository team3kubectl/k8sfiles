{{- if .Values.services.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: {{ .Values.global.namespace }}
  labels:
    app: frontend
spec:
  replicas: {{ .Values.services.frontend.replicas }}
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: {{ .Values.services.frontend.image }}
          imagePullPolicy: {{ .Values.services.frontend.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.services.frontend.port }}
          {{- if .Values.services.frontend.env }}
          env:
            {{- range $key, $value := .Values.services.frontend.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- end }}
          resources:
            requests:
              cpu: {{ .Values.services.frontend.resources.requests.cpu | quote }}
              memory: {{ .Values.services.frontend.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.services.frontend.resources.limits.cpu | quote }}
              memory: {{ .Values.services.frontend.resources.limits.memory | quote }}
{{- end }}
