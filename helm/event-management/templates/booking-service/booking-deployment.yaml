{{- if .Values.services.booking.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.services.booking.replicas }}
  {{- if .Values.services.booking.minReadySeconds }}
  minReadySeconds: {{ .Values.services.booking.minReadySeconds }}
  {{- end }}
  strategy:
    type: {{ .Values.services.booking.strategy.type }}
    rollingUpdate:
      maxUnavailable: {{ .Values.services.booking.strategy.maxUnavailable | quote }}
      maxSurge: {{ .Values.services.booking.strategy.maxSurge | quote }}
  selector:
    matchLabels:
      app: booking-service
  template:
    metadata:
      labels:
        app: booking-service
    spec:
      {{- if .Values.services.booking.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ .Values.services.booking.terminationGracePeriodSeconds }}
      {{- end }}
      containers:
        - name: booking-service
          image: {{ .Values.services.booking.image }}
          imagePullPolicy: {{ .Values.services.booking.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.services.booking.port }}
          envFrom:
            - configMapRef:
                name: booking-config
            - secretRef:
                name: booking-secret
          resources:
            requests:
              cpu: {{ .Values.services.booking.resources.requests.cpu | quote }}
              memory: {{ .Values.services.booking.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.services.booking.resources.limits.cpu | quote }}
              memory: {{ .Values.services.booking.resources.limits.memory | quote }}
          {{- if .Values.services.booking.probes.startup.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.services.booking.probes.startup.path }}
              port: {{ .Values.services.booking.port }}
            initialDelaySeconds: {{ .Values.services.booking.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.services.booking.probes.startup.periodSeconds }}
            failureThreshold: {{ .Values.services.booking.probes.startup.failureThreshold }}
          {{- end }}
          {{- if .Values.services.booking.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.services.booking.probes.readiness.path }}
              port: {{ .Values.services.booking.port }}
            initialDelaySeconds: {{ .Values.services.booking.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.services.booking.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.services.booking.probes.readiness.failureThreshold }}
          {{- end }}
          {{- if .Values.services.booking.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.services.booking.probes.liveness.path }}
              port: {{ .Values.services.booking.port }}
            initialDelaySeconds: {{ .Values.services.booking.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.services.booking.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.services.booking.probes.liveness.failureThreshold }}
          {{- end }}
{{- end }}
