{{- if .Values.databases.mongodb.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: events-mongodb
  namespace: {{ .Values.global.namespace }}
  labels:
    app: mongodb
spec:
  clusterIP: None
  selector:
    app: mongodb
  ports:
    - port: {{ .Values.databases.mongodb.port }}
      targetPort: {{ .Values.databases.mongodb.port }}
{{- end }}
