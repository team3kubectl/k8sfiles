apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-script
  namespace: {{ .Values.global.namespace }}
data:
  init-db.sh: |
    #!/bin/bash
    set -e

    echo "PostgreSQL Init Script Started - Creating Services Databases"

    # Function to create database if not exists
    create_database() {
      psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" -tc "SELECT 1 FROM pg_database WHERE datname = '$1'" | grep -q 1 || \
      psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" -c "CREATE DATABASE $1"
    }

    # Create all databases
    create_database payment_db
    create_database booking_db
    create_database ticket_db
    create_database events_db
    create_database users_db

    echo "All databases created successfully"
